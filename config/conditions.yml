# The example-injection condition presets, as a single registry.
# (Japanese-commented copy: conditions.ja.yml)
#
# The launcher (../launcher/launch_agents.py) reads this registry and, for a chosen
# (environment, lang, condition), overlays the `scenario` block onto the agent's config and
# stamps the `condition` label. The default `baseline` injects nothing.
#
# Path templates use {domain_pack}/exemplars/{lang}, resolved relative to the agent project
# root (agent/), where {domain_pack} is `aiwolf` or `hidden-bench`.
#
# `inject` lists which example kinds the condition feeds. They go through the same prompt
# injection mechanism for both environments.

conditions:
  # (1) baseline: instructions only, no exemplars, no analysis.
  baseline:
    label: baseline
    inject: []
    scenario:
      enabled: false

  # (2) analysis_only: analysis text only (no script / no utterance examples).
  analysis_only:
    label: analysis_only
    inject: [analysis]
    scenario:
      enabled: true
      delivery: full
      ack_mode: static
      sample_dir: "{domain_pack}/exemplars/{lang}/analysis"

  # (3) utterance_fewshot: single-utterance examples, no analysis.
  utterance_fewshot:
    label: utterance_fewshot
    inject: [utterances]
    scenario:
      enabled: true
      delivery: full
      ack_mode: static
      sample_dir: "{domain_pack}/exemplars/{lang}/utterances"

  # (4) utterance_fewshot_analysis: utterance examples + analysis (token-matched vs 6).
  utterance_fewshot_analysis:
    label: utterance_fewshot_analysis
    inject: [utterances, analysis]
    scenario:
      enabled: true
      delivery: full
      ack_mode: static
      sample_dir: "{domain_pack}/exemplars/{lang}/utterances"

  # (5) script_fewshot: full discussion transcripts, no analysis (token-matched vs 3).
  script_fewshot:
    label: script_fewshot
    inject: [scripts]
    scenario:
      enabled: true
      delivery: full
      ack_mode: static
      sample_dir: "{domain_pack}/exemplars/{lang}/scripts"

  # (6) script_fewshot_analysis: full transcripts + analysis (expected strongest).
  script_fewshot_analysis:
    label: script_fewshot_analysis
    inject: [scripts, analysis]
    scenario:
      enabled: true
      delivery: full
      ack_mode: static
      sample_dir: "{domain_pack}/exemplars/{lang}/scripts"
