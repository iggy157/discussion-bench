# Central control file — a human-readable map of the whole system.
# (Japanese-commented copy: system.ja.yml)
#
# This documents the run surface in one place. The OPERATIONAL knob is the root `.env`
# (secrets + LANG_CODE/CONDITION/ports), which docker compose and run_local.sh consume.
# Keep this file and `.env` in sync; this file is the readable source of truth.

system:
  name: "Multi-agent LLM discussion platform"
  # Where each piece lives.
  components:
    agent:   agent/                 # one shared agent; per-environment packs under agent/{aiwolf,hidden-bench}/
    servers:
      aiwolf:       server/aiwolf/       # Go werewolf (AIWolfDial) server
      hidden_bench: server/hidden-bench/ # Python HiddenBench server
    eval:    eval/                  # transcript failure-mode metrics
    web:     web/                   # human-in-the-loop lobby
    launcher: launcher/             # environment/condition/lang -> agent config -> run
    conditions: config/conditions.yml  # the example-injection condition presets

run:
  # Mirror of the active selection in .env (for readability / docs).
  lang: en                # jp | en
  condition: baseline     # one of the presets (see config/conditions.yml)
  environments:           # which to run; compose uses profiles of the same names
    - hiddenbench
    - aiwolf

environments:
  aiwolf:
    server_config: server/aiwolf/config/default_5.yml   # 5-player werewolf
    port: 8080
    agents: 5
  hiddenbench:
    server_config: server/hidden-bench/config/hiddenbench.yml
    port: 8090
    agents: 4               # fixed
    total_rounds: 15
    task_limit: 20          # how many of the 65 tasks to run

# LLM provider and decoding are set per-environment in the agent configs
# (agent/<env>/config/config.*.yml).
