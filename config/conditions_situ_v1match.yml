# Situation conditions ONLY, matched to the v1 run for apples-to-apples integration.
# v1統合用：situation条件のみ。+analysis は v1 と同じ「旧3本 analysis/」を参照（共通analysisは将来の本ラン用）。
# これで v1 の 6 条件と同一の analysis・タスク・シードで比較でき、結果を統合できる。
conditions:
  situation_fewshot:
    label: situation_fewshot
    inject: [situations]
    scenario:
      enabled: true
      delivery: full
      human: examples
      reply: ack
      sample_dir: "{domain_pack}/exemplars/{lang}/situations"

  situation_fewshot_analysis:
    label: situation_fewshot_analysis
    inject: [situations, analysis]
    scenario:
      enabled: true
      delivery: full
      human: examples
      reply: analysis
      sample_dir: "{domain_pack}/exemplars/{lang}/situations"
      analysis_dir: "{domain_pack}/exemplars/{lang}/analysis"
