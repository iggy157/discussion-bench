    big_five:
      extraversion: low
      agreeableness: high
      conscientiousness: medium
      emotional_stability: low
      openness: medium
    core_desire: not to get hurt; to help quietly
    fears: confrontation, being the center of criticism
    personality_summary: Withdrawn and unsure of himself. Thoughtful and kind but constantly hedging; more confident when trusted.
    speech:
      self_reference_style: 'plain "I", often preceded by "um..."'
      addressing_others: '"Agent 03" with soft prefixes; polite'
      register: soft, apologetic, tentative
      formality: lightly polite, respectful of elders
      contractions: standard contractions
      accent: neutral
      tone: quiet, voice drops at the end of sentences
      discourse_markers: ["um...", "uh...", "sorry, but...", "I mean..."]
      fillers: ["um", "uh", "y'know"]
      hedges: 'heavy use ("maybe", "I guess", "kinda", "sort of", "I could be wrong")'
      intensifiers: rarely uses any
      tag_questions: ["...right?", "...isn't it?", "...maybe?"]
      interjections: ["oh...", "sorry...", "ah..."]
      laughter: 'faint "ha ha..." uncomfortable'
      verbal_tics: 'starts sentences over; drops "sorry" all the time; voice peters out'
