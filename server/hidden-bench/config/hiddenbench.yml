# HiddenBench server config.
# (Japanese-commented copy: hiddenbench.ja.yml)
#
# Faithful reproduction of Li, Naito & Shirado (arXiv:2505.11556):
#   agent_count: 4, total_rounds: 15 (fixed, no early stopping).
#
# The root .env can override lang/condition/task_limit/total_rounds via
# HB_LANG / CONDITION / HB_TASK_LIMIT / HB_TOTAL_ROUNDS.

# WebSocket listen address
host: 0.0.0.0
port: 8090

# Agents per game (canonical = 4)
agent_count: 4

# Fixed number of sequential discussion rounds (paper T=15)
total_rounds: 15

# Language of task content delivery
#   en -> data/benchmark.json (upstream English set)
#   ja -> data/benchmark.ja.json if present, else falls back to English
lang: en

# Condition label recorded in results (one of the presets in config/conditions.yml)
condition: baseline

# Which tasks to run. Keep evaluation ids disjoint from any exemplar task ids.
#   task_ids: [1, 2, 3]   # explicit ids, OR
#   task_limit: 20        # first N tasks
task_ids:
task_limit: 20

# Repeat each task this many times (the paper uses 10 sessions/task)
repeats_per_task: 1

# Round-robin distribution + per-agent shuffle seed
seed: 42

# Timeouts (ms)
action_timeout_ms: 60000
response_timeout_ms: 120000

# Task data location (relative to project root)
data_dir: data
# Per-game result JSON output (consumed by eval/)
output_dir: log/results
