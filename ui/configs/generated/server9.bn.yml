  duration_args:
  - -v
  - error
  - -show_entries
  - format=duration
  - -of
  - default=noprint_wrappers=1:nokey=1
  pre_convert_args:
  - -c:a
  - aac
  - -b:a
  - 64k
  - -ar
  - '44100'
  - -ac
  - '2'
  split_args:
