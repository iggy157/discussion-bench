json_logger:
  enable: true
  output_dir: ./log/json
  filename: '{timestamp}_{teams}'
game_logger:
  enable: true
  output_dir: ./log/game
  filename: '{timestamp}_{teams}'
realtime_broadcaster:
  enable: true
  delay: 5s
  output_dir: ./log/realtime
  filename: '{timestamp}_{teams}'
tts_broadcaster:
  enable: false
  async: false
  target_duration: 1s
  segment_dir: ./cache/segment
  temp_dir: null
  host: http://localhost:50021
  timeout: 30s
  ffmpeg_path: ffmpeg
