server:
  web_socket:
    host: 0.0.0.0
    port: 8080
  authentication:
    enable: false
  timeout:
    action: 180s
    response: 300s
    acceptable: 5s
  max_continue_error_ratio: 0.2
game:
  agent_count: 5
  max_day: -1
  vote_visibility: true
  talk:
    max_count:
      per_agent: 4
      per_day: 20
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  whisper:
    max_count:
      per_agent: 0
      per_day: 0
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  vote:
    max_count: 1
    allow_self_vote: true
  attack_vote:
    max_count: 1
    allow_self_vote: true
    allow_no_target: false
logic:
  day_phases:
  - name: morning_whisper
    actions:
    - whisper
    only_day: 0
  - name: daily_talk
    actions:
    - talk
  night_phases:
  - name: evening_whisper
    actions:
    - whisper
    only_day: 0
  - name: execution
    actions:
    - execution
    except_day: 0
  - name: divine
    actions:
    - divine
  - name: night_whisper
    actions:
    - whisper
    except_day: 0
  - name: guard
    actions:
    - guard
    except_day: 0
  - name: attack
    actions:
    - attack
    except_day: 0
  roles:
    5:
      WEREWOLF: 1
      POSSESSED: 1
      SEER: 1
      BODYGUARD: 0
      VILLAGER: 2
      MEDIUM: 0
matching:
  room_match: true
  self_match: false
  is_optimize: false
  team_count: 5
  game_count: 5
  output_path: ./log/match_optimizer.json
  infinite_loop: false
takeover:
  enable: true
  timeout: 30s
  prefix: you-
custom_profile:
  enable: true
  profile_encoding:
    age: आयु
    gender: लिंग
    personality: व्यक्तित्व
  profiles:
  - name: मिनातो
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/01.png
    voice_id: 3
    age: 10
    gender: पुरुष
    personality: मिनातो का स्वभाव शांत और सहज है, और वह अपने आस-पास के लोगों के साथ
      नरमी से पेश आना पसंद करता है। थोड़ा भोला होने के कारण कभी-कभी उसके चेहरे से
      समझ पाना मुश्किल होता है कि वह क्या सोच रहा है, लेकिन उसकी यही मासूमियत आस-पास
      के लोगों को सुकून देती है। वह बेहद जिज्ञासु है, हर चीज़ में रुचि दिखाता है,
      और खासकर नई चीज़ें सीखना उसे बहुत पसंद है। वह बहुत संवेदनशील है और दूसरों की
      भावनाओं के प्रति भी सजग रहता है, लेकिन अपनी बात रखने में कमज़ोर है और कभी-कभी
      अपनी राय ठीक से व्यक्त नहीं कर पाता।
