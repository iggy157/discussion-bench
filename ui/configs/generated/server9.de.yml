server:
  web_socket:
    host: 0.0.0.0
    port: 8080
  authentication:
    enable: false
  timeout:
    action: 180s
    response: 300s
    acceptable: 5s
  max_continue_error_ratio: 0.2
game:
  agent_count: 9
  max_day: -1
  vote_visibility: true
  talk:
    max_count:
      per_agent: 4
      per_day: 36
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  whisper:
    max_count:
      per_agent: 0
      per_day: 0
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  vote:
    max_count: 1
    allow_self_vote: true
  attack_vote:
    max_count: 1
    allow_self_vote: true
    allow_no_target: false
logic:
  day_phases:
  - name: morning_whisper
    actions:
    - whisper
    only_day: 0
  - name: daily_talk
    actions:
    - talk
  night_phases:
  - name: evening_whisper
    actions:
    - whisper
    only_day: 0
  - name: execution
    actions:
    - execution
    except_day: 0
  - name: divine
    actions:
    - divine
  - name: night_whisper
    actions:
    - whisper
    except_day: 0
  - name: guard
    actions:
    - guard
    except_day: 0
  - name: attack
    actions:
    - attack
    except_day: 0
  roles:
    9:
      WEREWOLF: 2
      POSSESSED: 1
      SEER: 1
      BODYGUARD: 1
      VILLAGER: 3
      MEDIUM: 1
matching:
  room_match: true
  self_match: false
  is_optimize: false
  team_count: 9
  game_count: 9
  output_path: ./log/match_optimizer.json
  infinite_loop: false
takeover:
  enable: true
  timeout: 30s
  prefix: you-
custom_profile:
  enable: true
  profile_encoding:
    age: Alter
    gender: Geschlecht
    personality: Persönlichkeit
  profiles:
  - name: Minato
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/01.png
    voice_id: 3
    age: 10
    gender: Männlich
    personality: Minato hat ein sanftmütiges Wesen und pflegt gern einen ruhigen Umgang
      mit den Menschen in seiner Umgebung. Er ist ein wenig verträumt und zeigt manchmal
      einen Gesichtsausdruck, bei dem man nicht recht weiß, was er gerade denkt, doch
      gerade diese Unbekümmertheit wirkt auf andere beruhigend. Er ist überaus wissbegierig,
      interessiert sich für alles Mögliche und lernt besonders gern Neues. Er ist
      sehr feinfühlig und reagiert empfindsam auf die Gefühle anderer, tut sich jedoch
      schwer damit, sich durchzusetzen, und kann seine eigene Meinung manchmal nicht
      recht zum Ausdruck bringen.
  - name: Takumi
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/02.png
    voice_id: 55
    age: 10
    gender: Männlich
    personality: Takumi ist mutig und gibt selbst in schwierigen Situationen niemals
      auf. Mitunter wirkt er forsch und aufmüpfig, doch in Wahrheit hat er einen starken
      Drang, seine Umgebung zu beschützen, und eine gutherzige Seite, die alles für
      seine Gefährten gibt. Er bleibt stets ruhig und denkt gründlich nach, um das
      anstehende Problem zu lösen, handelt aber wegen dieses Wesens bisweilen auch
      unbesonnen. Er ist ein wenig stur und tut sich schwer damit, Ratschläge anderer
      anzunehmen, doch mit zunehmender Reife wird auch seine Flexibilität wachsen.
  - name: Kenji
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/03.png
    voice_id: 67
    age: 12
    gender: Männlich
    personality: Kenji ist wissbegierig und stellt sich neuen Dingen mit Tatendrang.
      Er schätzt seine Freunde und pflegt gern den Austausch mit den Menschen um ihn
      herum. Er ist ein wenig tollpatschig, bleibt aber stets zuversichtlich und lässt
      niemanden im Stich, der in Not ist. Er ist gutmütig und wirkt auf seine Mitmenschen
      sehr umgänglich.
  - name: Ryuji
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/04.png
    voice_id: 53
    age: 28
    gender: Männlich
    personality: Ryuji ist besonnen und umsichtig und handelt stets erst, nachdem
      er die Lage genau eingeschätzt hat. Er zeigt seine Gefühle selten nach außen
      und durchdenkt im Inneren vieles. Seine Gefährten halten ihn für ernsthaft und
      verlässlich, doch seine ausdruckslose Art kann mitunter auch Verunsicherung
      hervorrufen. Da er Dinge eher mit dem Verstand als mit dem Bauchgefühl beurteilt,
      tritt seine Standhaftigkeit, an seinen Überzeugungen festzuhalten, deutlich
      hervor. Er ist sehr eigenständig und geht die Dinge oft in seinem eigenen Tempo
      an.
  - name: Daisuke
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/05.png
    voice_id: 12
    age: 16
    gender: Männlich
    personality: Daisuke hat ein äußerst introvertiertes und vorsichtiges Wesen und
      ist im Umgang mit anderen eher zurückhaltend. Es fällt ihm schwer, seine Gefühle
      und Gedanken anderen mitzuteilen, und er grübelt oft im Stillen vor sich hin.
      Er besitzt eine gütige Ader und ist sehr fürsorglich, wenn es darum geht, anderen
      zu helfen, zweifelt jedoch bisweilen an seiner eigenen Stellung und ringt innerlich
      mit sich. Er ist still, und manchmal kann er seine Gefühle nicht mehr zurückhalten
      und gerät in eine niedergeschlagene Stimmung, doch sobald er lernt, sich anderen
      anzuvertrauen, findet er nach und nach seine innere Ruhe wieder.
  - name: Shion
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/06.png
    voice_id: 94
    age: 16
    gender: Männlich
    personality: Shion ist überaus selbstbewusst und handelt häufig kühl und berechnend.
      Nach außen wirkt er ruhig und ist ein geübter Beobachter der Bewegungen anderer,
      doch im Inneren wünscht er sich, im Mittelpunkt zu stehen. Mitunter zeigt er
      seiner Umgebung eine etwas herausfordernde Haltung und neigt dazu, alles in
      seinem eigenen Tempo voranzutreiben. Zudem zeigt er seine Gefühle kaum und beurteilt
      die Dinge kühl und logisch. In dem überraschenden Lächeln, das er gelegentlich
      aufblitzen lässt, verbirgt sich ein Reiz, der seine Umgebung verblüfft.
  - name: Benjamin
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/07.png
    voice_id: 51
    age: 28
    gender: Männlich
    personality: Benjamin ist eine kluge und gelassene Persönlichkeit. Er vermag die
      Dinge ruhig und vernünftig zu durchdenken und legt selbst in emotionalen Situationen
      Wert auf Logik. In Gesellschaft tritt er elegant und höflich auf und würzt seine
      Gespräche oft mit Ironie und Humor, ohne damit jedoch sein Gegenüber zu verletzen
      – vielmehr versteht er es, eine heitere Atmosphäre zu schaffen. Er hat auch
      eine introvertierte Seite, versinkt häufig in tiefes Nachdenken und hält bisweilen
      Abstand zu seinen Mitmenschen. Doch seine Besonnenheit und sein Wissen sind
      der Grund, weshalb man ihm auch in schwierigen Lagen vertraut.
  - name: Toshio
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/08.png
    voice_id: 13
    age: 28
    gender: Männlich
    personality: Toshio hat ein kühles, berechnendes Wesen und zeigt seine Gefühle
      kaum nach außen. Er besitzt einen starken Willen und schreitet beständig auf
      sein Ziel zu. Gegenüber seiner Umgebung nimmt er gern eine zurückhaltende Haltung
      ein, drängt sich selten auf und umgibt sich mit einer geheimnisvollen Aura.
      Mitunter beobachtet er die Dinge mit scharfem Blick und besitzt die Fähigkeit,
      eine Lage rasch einzuschätzen. Deshalb gilt er als verlässlich und genießt das
      Vertrauen seiner Umgebung, geht aber vorsichtig damit um, sich anderen tiefer
      zu öffnen. In seiner Vergangenheit scheint es einen Schmerz oder ein Leid zu
      geben, das er anderen jedoch selten zeigt – vielleicht hängen diese Narben mit
      seiner kühlen Seite zusammen.
  - name: Jonathan
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/09.png
    voice_id: 52
    age: 38
    gender: Männlich
    personality: Jonathan hat ein sanftes und introvertiertes Wesen und legt großen
      Wert auf inneren Frieden. Statt tiefe Beziehungen zu anderen zu knüpfen, verbringt
      er lieber stille Stunden für sich. Daher liebt er Bücher und Wissen und liest
      häufig. Im Umgang mit anderen ist er mild und freundlich und lässt bisweilen
      unvermittelt ein Lächeln aufblitzen. Bei aller geheimnisvollen und ruhigen Aura
      erzählt er anderen kaum etwas über sich selbst. Die Menschen um ihn herum empfinden
      in seiner stillen Güte und seinem gelassenen Wesen oft ein Gefühl der Geborgenheit.
  - name: Shunichi
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/10.png
    voice_id: 11
    age: 32
    gender: Männlich
    personality: Shunichi ist eine überaus selbstbewusste Persönlichkeit, die in jeder
      Lage Gelassenheit zu bewahren versteht. Er ist nicht gerade bescheiden und hat
      eine leicht spöttische Seite, doch gerade das macht einen Teil seines Reizes
      aus. Gesellig ist er nicht, doch im richtigen Moment versteht er es zu kommunizieren,
      und seine Umgebung verlässt sich auf ihn. Er wird selten übermäßig emotional
      und kann die Lage kühl analysieren und danach handeln, weshalb er überraschend
      auch eine kluge, verständige Seite besitzt.
  - name: George
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/11.png
    voice_id: 21
    age: 65
    gender: Männlich
    personality: George hat ein mildes und gelassenes Wesen, zeigt aber auch eine
      etwas sture und eigensinnige Seite. Seine Umgebung sieht in ihm einen seinem
      Alter entsprechend erfahrenen und verlässlichen Menschen, und da er stets besonnene
      Urteile fällen kann, geht er auch mit schwierigen Situationen ohne Hast um.
      Allerdings schimmert in seiner Miene bisweilen eine gewisse Strenge oder Unbeholfenheit
      durch, und statt aktiv auf andere zuzugehen, beobachtet er die Dinge eher aus
      einer gewissen Distanz. Er ist sehr eigenständig und neigt dazu, Probleme selbst
      zu lösen, ohne sich auf andere zu verlassen.
  - name: Servas
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/12.png
    voice_id: 42
    age: 85
    gender: Männlich
    personality: Servas hat ein überaus mildes und gelassenes Wesen. Gestützt auf
      das Wissen und die Erfahrung, die er mit den Jahren gesammelt hat, gibt er den
      Menschen in seiner Umgebung häufig Ratschläge. Er ist ein hervorragender Zuhörer
      und kann sich jedem gegenüber offen und herzlich unterhalten. Zudem äußert er
      bisweilen tiefe philosophische Gedanken, deren Worte vielen Menschen Inspiration
      schenken. Er ist voller Lebenskraft und vermittelt seiner Umgebung stets positive
      Energie.
  - name: Sakura
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/01.png
    voice_id: 43
    age: 10
    gender: Weiblich
    personality: Sakura ist ein fröhliches und ein wenig schelmisches Mädchen. Sie
      ist wissbegierig, interessiert sich für alles und stellt sich tatkräftig jeder
      Herausforderung. Manchmal treibt sie Schabernack, um ihre Umgebung zum Lachen
      zu bringen, oder löst gern kleine Rätsel. Sie ist anhänglich und freundet sich
      mit jedem rasch an, weshalb sie gut darin ist, mit den Menschen um sie herum
      warm zu werden. Allerdings hat sie auch eine etwas tollpatschige Seite, und
      selbst wenn ihr ein Missgeschick passiert, versucht sie es mit einem Lächeln
      und positiver Einstellung zu meistern.
  - name: Rin
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/02.png
    voice_id: 54
    age: 9
    gender: Weiblich
    personality: Rin ist ein lebhaftes und munteres Mädchen. Manchmal ist sie ein
      wenig altklug und führt, wenn sie mit den älteren Geschwistern zusammen ist,
      erwachsene Gespräche oder bringt witzige Ideen ein. Sie ist wissbegierig und
      liebt Abenteuer und neue Herausforderungen über alles. Sie hat eine etwas tollpatschige
      Seite und überrascht oder belustigt ihre Umgebung häufig, doch mit ihrem heiteren
      Wesen wird sie von allen geliebt.
  - name: Yumi
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/03.png
    voice_id: 46
    age: 16
    gender: Weiblich
    personality: Yumi hat ein heiteres und munteres Wesen. Bei aller Zurückhaltung
      zeigt sie auch eine gütige Seite, die sich um die Menschen in ihrer Umgebung
      sorgt. Sie ist sanftmütig, doch ihren Freunden und ihrer Familie gegenüber ist
      sie äußerst leidenschaftlich und kann niemanden in Not im Stich lassen. Schon
      bei Kleinigkeiten zeigt sie ein Lächeln und verbreitet positive Energie in ihrer
      Umgebung. Sie ist anhänglich und kann selbst mit Fremden rasch warm werden.
  - name: Mei
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/04.png
    voice_id: 14
    age: 24
    gender: Weiblich
    personality: Mei ist eine selbstbewusste, gesellige und ein wenig verspielte Frau.
      Sie wirkt auf ihre Mitmenschen anziehend und übernimmt oft die Rolle, ihre Umgebung
      zu unterhalten. Sie kennt ihren eigenen Reiz gut und versteht es, sich je nach
      Situation passend zu verhalten. Sie ist etwas herausfordernd und macht bisweilen
      einen leicht kühlen Eindruck, doch im Grunde besitzt sie ein Charisma, das die
      Menschen anzieht.
  - name: Misaki
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/05.png
    voice_id: 74
    age: 24
    gender: Weiblich
    personality: Misaki hat ein gelassenes Wesen und geht mit den Dingen besonnen
      um. Mitunter wirkt sie ein wenig unwirsch, doch im Inneren besitzt sie eine
      gütige Ader und zögert nicht, jemandem in Not die Hand zu reichen. Sie zeigt
      ihre Gefühle nicht nach außen und erzählt auch in ihren Beziehungen zu anderen
      nicht viel, doch von vertrauten Menschen wird sie oft als verlässlich angesehen.
      Sie hat eine etwas verträumte Seite, und gerade diese stille Aura ist einer
      ihrer Reize.
  - name: Mio
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/06.png
    voice_id: 23
    age: 17
    gender: Weiblich
    personality: Mio hat ein heiteres und munteres Wesen und bringt die Menschen in
      ihrer Umgebung ganz von selbst zum Lächeln. Sie ist wissbegierig und stellt
      sich gern neuen Dingen. Sie hat eine etwas tollpatschige Seite, und selbst wenn
      ihr ein Missgeschick passiert, sieht man es ihr mit einem Lächeln nach. Sie
      hat eine eigene, gefestigte Meinung, vermag aber auch den Ansichten anderer
      Gehör zu schenken – ein ausgewogenes Wesen.
  - name: Mizuki
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/07.png
    voice_id: 20
    age: 24
    gender: Weiblich
    personality: Mizuki ist eine überaus selbstbewusste Frau, auf die sich ihre Umgebung
      häufig verlässt. Sie denkt besonnen und logisch und versteht es, die Menschen
      genau zu beobachten. Daher beurteilt sie die Dinge stets ruhig und wählt ihr
      Handeln je nach Lage. Mitunter wirkt sie ein wenig hochmütig, doch in Wahrheit
      ist sie sehr fürsorglich und kann die Schwächeren nicht im Stich lassen. Ihre
      Umgebung verlässt sich auf sie, und bisweilen vertritt sie ihre Meinung mit
      Nachdruck, doch dahinter verbirgt sich auch eine Güte, die für andere mitfühlt.
  - name: Minako
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/08.png
    voice_id: 90
    age: 28
    gender: Weiblich
    personality: Minako ist sehr besonnen und handelt in jeder Lage ruhig und gefasst.
      Selbst wenn ihre Umgebung emotional wird, erfasst sie die Tatsachen klar und
      reagiert gelassen. Daher wird sie oft um ihre Meinung gebeten und übernimmt
      nicht selten eine führende Rolle. Sie zeigt ihre Gefühle selten, doch Menschen,
      denen sie vertraut, zeigt sie auch eine gütige Seite. Sie hat eine etwas sture
      Ader und hält mit Nachdruck an ihren Überzeugungen fest. Zudem ist sie körperlich
      fit und vernachlässigt ihr Training nie.
  - name: Asuka
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/09.png
    voice_id: 2
    age: 29
    gender: Weiblich
    personality: Asuka hat ein besonnenes und rationales Wesen, zeigt ihre Gefühle
      nicht nach außen und urteilt umsichtig. Mitunter wirkt sie ein wenig unwirsch,
      doch eben deshalb ist sie äußerst nachdenklich und reagiert feinfühlig auf die
      Umstände um sie herum. Sie hat eine eigene, gefestigte Meinung und vertritt
      sie nötigenfalls mit Nachdruck. Im Umgang mit Menschen tut sie sich zwar etwas
      schwer, doch dafür geht sie ihre Arbeit und ihr Studium stets mit großem Ernst
      an.
  - name: Midori
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/10.png
    voice_id: 69
    age: 38
    gender: Weiblich
    personality: Midori hat ein mildes und gütiges Wesen. Sie ist jedem gegenüber
      umgänglich, hört sich die Sorgen und Probleme ihrer Mitmenschen an und gibt
      treffende Ratschläge – eine verlässliche Persönlichkeit. Sie hat auch eine etwas
      schüchterne Seite und tritt Fremden gegenüber oft zurückhaltend auf, doch sobald
      sie warm geworden ist, zeigt sie auch eine heitere und muntere Seite. Sie kocht
      gern und hat eine häusliche Ader, besitzt aber auch ein wenig Abenteuerlust
      und stellt sich gern neuen Dingen. Sowohl im Beruf als auch im Privatleben legt
      sie Wert auf Ausgewogenheit und auf die Harmonie mit den Menschen in ihrer Umgebung.
  - name: Victoria
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/11.png
    voice_id: 9
    age: 37
    gender: Weiblich
    personality: Victoria ist eine besonnene und kluge Persönlichkeit, doch bisweilen
      errichtet gerade ihre übermäßige Nachdenklichkeit eine Mauer zu ihrer Umgebung.
      Ihre Gefühlsäußerungen sind zurückhaltend; sie beobachtet die Mienen und das
      Verhalten anderer scharf und versucht, die Gedanken in deren Innerem zu durchschauen.
      Da sie sich selbst kaum ausdrückt, wirkt sie auf andere oft etwas geheimnisvoll,
      doch im Inneren besitzt sie einen starken Willen, und ihre Haltung, an den eigenen
      Überzeugungen festzuhalten, ist deutlich zu erkennen. Mitunter zeigt sie eine
      Miene, als empfände sie Unruhe oder Angst, doch gerade in solchen Augenblicken
      blitzt bisweilen ihre wahre Stärke auf.
  - name: Shizue
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/12.png
    voice_id: 27
    age: 78
    gender: Weiblich
    personality: Shizue hat ein überaus mildes und gütiges Wesen. Auch mit fortgeschrittenem
      Alter verliert sie ihr warmes Lächeln gegenüber ihrer Umgebung nie und ist ein
      fürsorglicher Mensch. Stets kümmert sie sich um die Menschen um sie herum, ist
      umgänglich und zeigt bisweilen auch eine etwas schelmische Seite. Mitunter spricht
      sie jemandem, der niedergeschlagen ist, sanft Mut zu, und wenn Hilfe nötig ist,
      reicht sie ohne Zögern die Hand, weshalb sie im Dorf und in der Gegend von vielen
      geliebt wird. Durch ihre lange Lebenserfahrung weiß Shizue, wie wertvoll es
      ist, in Ruhe mit den Menschen zusammenzuleben.
