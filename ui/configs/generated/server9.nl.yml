server:
  web_socket:
    host: 0.0.0.0
    port: 8080
  authentication:
    enable: false
  timeout:
    action: 180s
    response: 300s
    acceptable: 5s
  max_continue_error_ratio: 0.2
game:
  agent_count: 9
  max_day: -1
  vote_visibility: true
  talk:
    max_count:
      per_agent: 4
      per_day: 36
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  whisper:
    max_count:
      per_agent: 0
      per_day: 0
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  vote:
    max_count: 1
    allow_self_vote: true
  attack_vote:
    max_count: 1
    allow_self_vote: true
    allow_no_target: false
logic:
  day_phases:
  - name: morning_whisper
    actions:
    - whisper
    only_day: 0
  - name: daily_talk
    actions:
    - talk
  night_phases:
  - name: evening_whisper
    actions:
    - whisper
    only_day: 0
  - name: execution
    actions:
    - execution
    except_day: 0
  - name: divine
    actions:
    - divine
  - name: night_whisper
    actions:
    - whisper
    except_day: 0
  - name: guard
    actions:
    - guard
    except_day: 0
  - name: attack
    actions:
    - attack
    except_day: 0
  roles:
    9:
      WEREWOLF: 2
      POSSESSED: 1
      SEER: 1
      BODYGUARD: 1
      VILLAGER: 3
      MEDIUM: 1
matching:
  room_match: true
  self_match: false
  is_optimize: false
  team_count: 9
  game_count: 9
  output_path: ./log/match_optimizer.json
  infinite_loop: false
takeover:
  enable: true
  timeout: 30s
  prefix: you-
custom_profile:
  enable: true
  profile_encoding:
    age: Leeftijd
    gender: Geslacht
    personality: Persoonlijkheid
  profiles:
  - name: Minato
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/01.png
    voice_id: 3
    age: 10
    gender: Man
    personality: Minato heeft een rustig karakter en gaat graag op een kalme manier
      met de mensen om zich heen om. Hij is een beetje wereldvreemd en heeft soms
      een gezichtsuitdrukking waarbij je niet weet wat hij denkt, maar die onschuld
      stelt de mensen om hem heen gerust. Hij is nieuwsgierig, toont overal interesse
      in en houdt er vooral van om nieuwe dingen te leren. Hij is gevoelig en heeft
      oog voor de emoties van anderen, maar hij vindt het moeilijk om voor zichzelf
      op te komen en kan zijn mening soms niet goed onder woorden brengen.
  - name: Takumi
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/02.png
    voice_id: 55
    age: 10
    gender: Man
    personality: Takumi is moedig en geeft zelfs in moeilijke situaties nooit op.
      Soms lijkt hij koppig en opstandig, maar in werkelijkheid heeft hij een sterk
      verlangen om de mensen om hem heen te beschermen en een goedhartige kant die
      alles geeft voor zijn vrienden. Hij blijft altijd kalm en denkt grondig na om
      het probleem voor hem op te lossen, maar door dat karakter handelt hij soms
      roekeloos. Hij is een beetje koppig en vindt het moeilijk om advies van anderen
      aan te nemen, maar naarmate hij groeit, zal die flexibiliteit toenemen.
  - name: Kenji
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/03.png
    voice_id: 67
    age: 12
    gender: Man
    personality: Kenji is nieuwsgierig en gaat uitdagingen graag actief aan. Hij hecht
      waarde aan zijn vrienden en communiceert graag met de mensen om hem heen. Hij
      is een beetje onhandig, maar hij blijft altijd positief en laat mensen in nood
      nooit in de steek. Hij is ruimdenkend en wordt door de mensen om hem heen als
      toegankelijk ervaren.
  - name: Ryuji
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/04.png
    voice_id: 53
    age: 28
    gender: Man
    personality: Ryuji is kalm en voorzichtig van aard en handelt altijd nadat hij
      de situatie heeft ingeschat. Hij toont zelden zijn emoties en brengt zijn tijd
      door terwijl hij innerlijk over veel dingen nadenkt. Zijn vrienden vinden hem
      serieus en betrouwbaar, maar zijn uitdrukkingsloze houding wekt soms ook onrust.
      Omdat hij dingen met zijn verstand beoordeelt in plaats van met zijn intuïtie,
      komt zijn standvastige houding sterk naar voren. Hij is heel zelfstandig en
      doet dingen vaak op zijn eigen tempo.
  - name: Daisuke
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/05.png
    voice_id: 12
    age: 16
    gender: Man
    personality: Daisuke is zeer introvert en voorzichtig van aard en staat wat terughoudend
      tegenover contact met anderen. Hij vindt het moeilijk om zijn gevoelens en gedachten
      aan anderen over te brengen en piekert vaak in stilte. Hij is vriendelijk en
      zorgt vol meeleven voor anderen, maar soms heeft hij weinig vertrouwen in zijn
      eigen positie en worstelt hij innerlijk. Door zijn stille karakter kan hij soms
      zijn emoties niet meer in bedwang houden en somber worden, maar zodra hij leert
      op de mensen om hem heen te steunen, vindt hij geleidelijk zijn kalmte terug.
  - name: Shion
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/06.png
    voice_id: 94
    age: 16
    gender: Man
    personality: Shion heeft veel zelfvertrouwen en handelt vaak kalm en berekenend.
      Aan de buitenkant is hij rustig en goed in het observeren van anderen, maar
      vanbinnen wil hij graag in het middelpunt staan. Hij toont soms een wat uitdagende
      houding tegenover zijn omgeving en heeft de neiging alles op zijn eigen tempo
      te willen doen. Bovendien laat hij zijn emoties weinig zien en beoordeelt hij
      dingen koel en logisch. In de onverwachte glimlach die hij af en toe laat zien,
      schuilt een charme die zijn omgeving verrast.
  - name: Benjamin
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/07.png
    voice_id: 51
    age: 28
    gender: Man
    personality: Benjamin is een intelligent en bezonnen persoon. Hij kan kalm en
      rationeel nadenken en hecht zelfs in emotionele situaties waarde aan de logica.
      In gezelschap is hij elegant en beleefd, en in gesprekken mengt hij vaak ironie
      en humor, maar zonder de ander te kwetsen, en hij is er goed in om een aangename
      sfeer te scheppen. Hij heeft ook een introverte kant, verzinkt vaak in diepe
      gedachten en houdt soms wat afstand van de mensen om hem heen. Toch zorgen zijn
      kalmte en kennis ervoor dat hij zelfs in moeilijke situaties door zijn omgeving
      wordt vertrouwd.
  - name: Toshio
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/08.png
    voice_id: 13
    age: 28
    gender: Man
    personality: Toshio heeft een kalm en berekenend karakter en toont zelden zijn
      emoties. Hij heeft een sterke wil en is iemand die gestaag op zijn doel afgaat.
      Hij neigt ertoe een stapje terug te doen tegenover zijn omgeving, komt weinig
      voor zichzelf op en hangt een wat raadselachtige sfeer om zich heen. Soms observeert
      hij dingen met een scherpe blik en heeft hij het vermogen om snel een situatie
      in te schatten. Daardoor wordt hij door zijn omgeving als betrouwbaar gezien,
      maar hij is voorzichtig met het aangaan van diepe relaties. In zijn verleden
      lijkt een of andere pijn of leed te schuilen, maar dat laat hij anderen zelden
      zien, en misschien hangt dat litteken samen met zijn koele kant.
  - name: Jonathan
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/09.png
    voice_id: 52
    age: 38
    gender: Man
    personality: Jonathan heeft een rustig en introvert karakter en hecht waarde aan
      innerlijke vrede. Hij brengt liever stille tijd door dan dat hij diepe relaties
      met anderen aangaat. Daarom houdt hij van boeken en kennis en leest hij vaak.
      In de omgang met mensen is hij zachtaardig en vriendelijk, en hij laat soms
      onverwacht een glimlach zien. Hoewel hij een ietwat mysterieuze en kalme sfeer
      heeft, vertelt hij anderen bijna nooit iets over zichzelf. De mensen om hem
      heen voelen zich vaak gerustgesteld door zijn stille vriendelijkheid en bedaarde
      karakter.
  - name: Shunichi
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/10.png
    voice_id: 11
    age: 32
    gender: Man
    personality: Shunichi is een zeer zelfverzekerd persoon die in elke situatie kalm
      kan blijven. Hij is niet bescheiden en heeft een wat ironische kant, maar dat
      hoort ook bij zijn charme. Hij is niet bijzonder sociaal, maar hij is goed in
      communiceren op het juiste moment en wordt door zijn omgeving als betrouwbaar
      gezien. Hij wordt zelden overdreven emotioneel en kan situaties kalm analyseren
      en daarnaar handelen, waardoor hij verrassend genoeg ook een verstandige kant
      heeft.
  - name: George
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/11.png
    voice_id: 21
    age: 65
    gender: Man
    personality: George heeft een vriendelijk en bezonnen karakter, maar ook een wat
      koppige en eigenwijze kant. Door zijn omgeving wordt hij gezien als een ervaren
      en betrouwbaar persoon die bij zijn leeftijd past, en omdat hij altijd kalm
      oordeelt, gaat hij ook in moeilijke situaties zonder paniek te werk. Toch komt
      er soms een zekere strengheid of onhandigheid in zijn gezicht naar voren, en
      in plaats van actief contact met anderen te zoeken, slaat hij dingen liever
      wat op afstand gade. Hij is zeer zelfstandig en heeft de neiging problemen zelf
      op te lossen zonder op anderen te leunen.
  - name: Servaas
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/12.png
    voice_id: 42
    age: 85
    gender: Man
    personality: Servaas heeft een zeer rustig en bedaard karakter. Op basis van de
      kennis en ervaring die hij met de jaren heeft opgedaan, geeft hij vaak advies
      aan de mensen om hem heen. Hij is een uitstekende luisteraar en kan met iedereen
      openhartig praten. Bovendien spreekt hij soms diepe filosofische gedachten uit,
      en zijn woorden geven veel mensen inspiratie. Hij zit vol levenskracht en geeft
      zijn omgeving altijd positieve energie.
  - name: Sakura
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/01.png
    voice_id: 43
    age: 10
    gender: Vrouw
    personality: Sakura is een vrolijk en wat ondeugend meisje. Ze is nieuwsgierig
      en gaat alles met interesse en enthousiasme aan. Soms haalt ze een grapje uit
      om de mensen om haar heen aan het lachen te maken, en ze is goed in het oplossen
      van kleine raadsels. Ze is aanhalig en sluit snel met iedereen vriendschap,
      dus ze raakt makkelijk bevriend met de mensen om haar heen. Toch heeft ze ook
      een wat onhandige kant en blijft ze, zelfs als ze een fout maakt, positief en
      probeert ze het met een glimlach te boven te komen.
  - name: Rin
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/02.png
    voice_id: 54
    age: 9
    gender: Vrouw
    personality: Rin is een levendig en energiek meisje. Soms is ze een beetje wijsneuzig
      en houdt ze, wanneer ze met de oudere jongens en meisjes is, volwassen praatjes
      of komt ze met leuke ideeën. Ze is nieuwsgierig en houdt enorm van avontuur
      en nieuwe uitdagingen. Ze heeft een wat onhandige kant en verrast of laat de
      mensen om haar heen vaak lachen, maar met haar vrolijke karakter wordt ze door
      iedereen geliefd.
  - name: Yumi
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/03.png
    voice_id: 46
    age: 16
    gender: Vrouw
    personality: Yumi heeft een vrolijk en energiek karakter. Hoewel ze bescheiden
      is, heeft ze ook een vriendelijke kant die om de mensen om haar heen geeft.
      Ze is rustig van aard, maar tegenover vrienden en familie is ze zeer toegewijd
      en kan ze iemand in nood niet zomaar negeren. Om de kleinste dingen laat ze
      een glimlach zien en verspreidt ze positieve energie om zich heen. Ze is aanhalig
      en kan ook met mensen die ze voor het eerst ontmoet snel een band krijgen.
  - name: Mei
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/04.png
    voice_id: 14
    age: 24
    gender: Vrouw
    personality: Mei is een zelfverzekerde, sociale en wat speelse vrouw. Ze is aantrekkelijk
      voor de mensen om haar heen en vervult vaak de rol van degene die de sfeer opvrolijkt.
      Ze is zich goed bewust van haar eigen charme en kan zich naargelang de situatie
      gepast gedragen. Ze is een beetje uitdagend en maakt soms een wat koele indruk,
      maar in de kern heeft ze een charisma dat mensen aantrekt.
  - name: Misaki
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/05.png
    voice_id: 74
    age: 24
    gender: Vrouw
    personality: Misaki heeft een kalm karakter en gaat nuchter met dingen om. Ze
      kan soms wat afstandelijk overkomen, maar vanbinnen heeft ze een vriendelijke
      kant en aarzelt ze niet om de hand te reiken naar wie het moeilijk heeft. Ze
      toont haar emoties niet en zegt ook in haar relaties met anderen niet veel,
      maar door wie haar na staan wordt ze vaak als betrouwbaar gezien. Ze is soms
      wat afwezig, en die stille sfeer is een van haar charmes.
  - name: Mio
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/06.png
    voice_id: 23
    age: 17
    gender: Vrouw
    personality: 'Mio heeft een vrolijk en energiek karakter en is iemand die de mensen
      om haar heen als vanzelf aan het lachen maakt. Ze is nieuwsgierig en houdt ervan
      nieuwe dingen uit te proberen. Ze heeft een wat onhandige kant, maar zelfs als
      ze een fout maakt, wordt haar dat vaak met een lach vergeven. Ze heeft een duidelijke
      eigen mening, maar kan ook luisteren naar de mening van anderen: een evenwichtig
      karakter.'
  - name: Mizuki
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/07.png
    voice_id: 20
    age: 24
    gender: Vrouw
    personality: Mizuki is een zeer zelfverzekerde vrouw die door haar omgeving vaak
      als betrouwbaar wordt gezien. Ze denkt kalm en logisch en kan mensen goed observeren.
      Daardoor oordeelt ze altijd nuchter en kiest ze haar gedrag naargelang de situatie.
      Soms wordt ze als een tikje hooghartig gezien, maar in werkelijkheid is ze erg
      zorgzaam en kan ze de zwakkeren niet aan hun lot overlaten. Ze wordt door haar
      omgeving vertrouwd en komt soms krachtig voor haar mening op, maar daarachter
      schuilt ook een vriendelijkheid die om anderen geeft.
  - name: Minako
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/08.png
    voice_id: 90
    age: 28
    gender: Vrouw
    personality: Minako is zeer kalm en handelt in elke situatie bedaard. Zelfs wanneer
      de mensen om haar heen emotioneel worden, weet zij de feiten goed te overzien
      en reageert ze nuchter. Daarom wordt vaak om haar mening gevraagd en neemt ze
      niet zelden de leiding. Ze toont haar emoties weinig, maar tegenover mensen
      die ze vertrouwt laat ze ook een vriendelijke kant zien. Ze is een beetje koppig
      en houdt sterk vast aan haar overtuigingen. Bovendien is ze trots op haar conditie
      en slaat ze geen training over.
  - name: Asuka
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/09.png
    voice_id: 2
    age: 29
    gender: Vrouw
    personality: Asuka heeft een kalm en rationeel karakter, toont haar emoties niet
      en beoordeelt dingen voorzichtig. Ze kan wat afstandelijk overkomen, maar juist
      daardoor is ze zeer bedachtzaam en gevoelig voor wat er om haar heen gebeurt.
      Ze heeft een duidelijke eigen mening en komt daar zo nodig met een krachtige
      houding voor op. De omgang met mensen valt haar soms wat zwaar, maar in ruil
      daarvoor laat ze in haar werk en studie nooit haar serieuze instelling varen.
  - name: Midori
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/10.png
    voice_id: 69
    age: 38
    gender: Vrouw
    personality: Midori heeft een rustig en goedhartig karakter. Ze is voor iedereen
      toegankelijk, luistert naar de zorgen en problemen van de mensen om haar heen
      en is een betrouwbaar iemand die rake adviezen geeft. Ze heeft ook een wat verlegen
      kant en stelt zich tegenover mensen die ze voor het eerst ontmoet vaak terughoudend
      op, maar zodra het ijs gebroken is, laat ze ook een vrolijke en energieke kant
      zien. Ze houdt van koken en heeft een huiselijke kant, maar ze heeft ook wat
      avontuurszin en houdt ervan nieuwe dingen uit te proberen. Zowel in haar werk
      als privé hecht ze waarde aan balans en aan de harmonie met de mensen om haar
      heen.
  - name: Victoria
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/11.png
    voice_id: 9
    age: 37
    gender: Vrouw
    personality: Victoria is een kalm en verstandig persoon, maar soms schept haar
      overdreven bedachtzaamheid een muur tussen haar en haar omgeving. Ze uit haar
      emoties spaarzaam, observeert scherp de uitdrukkingen en houding van anderen
      en probeert te doorgronden wat er in hun hart leeft. Omdat ze zich weinig uit,
      maakt ze op anderen vaak een wat raadselachtige indruk, maar vanbinnen heeft
      ze een sterke wil en de houding om aan haar overtuigingen vast te houden. Af
      en toe laat ze een gezicht zien dat onrust of angst verraadt, maar juist op
      zulke momenten is een glimp te zien van haar werkelijke kracht.
  - name: Shizue
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/female/12.png
    voice_id: 27
    age: 78
    gender: Vrouw
    personality: Shizue heeft een zeer rustig en vriendelijk karakter. Ook op gevorderde
      leeftijd houdt ze haar warme glimlach naar haar omgeving in stand en is ze een
      zorgzaam mens. Ze geeft altijd om de mensen om haar heen, is toegankelijk en
      laat soms ook een wat ondeugende kant zien. Ze spreekt iemand die de moed verloren
      heeft vriendelijk toe en aarzelt niet om de hand te reiken wanneer er hulp nodig
      is, en daarom wordt ze door veel mensen in het dorp en de buurt geliefd. Door
      haar jarenlange levenservaring weet Shizue hoe belangrijk het is om in alle
      rust met mensen samen te leven.
