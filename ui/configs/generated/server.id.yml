      menunjukkan sikap sedikit menantang terhadap orang di sekitarnya, dan cenderung
      ingin menjalankan segala sesuatu dengan ritmenya sendiri. Selain itu, ia jarang
      menampilkan emosi, dan termasuk tipe yang menilai segala hal secara dingin dan
