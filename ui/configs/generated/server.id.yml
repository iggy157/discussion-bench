server:
  web_socket:
    host: 0.0.0.0
    port: 8080
  authentication:
    enable: false
  timeout:
    action: 180s
    response: 300s
    acceptable: 5s
  max_continue_error_ratio: 0.2
game:
  agent_count: 5
  max_day: -1
  vote_visibility: true
  talk:
    max_count:
      per_agent: 4
      per_day: 20
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  whisper:
    max_count:
      per_agent: 0
      per_day: 0
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  vote:
    max_count: 1
    allow_self_vote: true
  attack_vote:
    max_count: 1
    allow_self_vote: true
    allow_no_target: false
logic:
  day_phases:
  - name: morning_whisper
    actions:
    - whisper
    only_day: 0
  - name: daily_talk
    actions:
    - talk
  night_phases:
  - name: evening_whisper
    actions:
    - whisper
    only_day: 0
  - name: execution
    actions:
    - execution
    except_day: 0
  - name: divine
    actions:
    - divine
  - name: night_whisper
    actions:
    - whisper
    except_day: 0
  - name: guard
    actions:
    - guard
    except_day: 0
  - name: attack
    actions:
    - attack
    except_day: 0
  roles:
    5:
      WEREWOLF: 1
      POSSESSED: 1
      SEER: 1
      BODYGUARD: 0
      VILLAGER: 2
      MEDIUM: 0
matching:
  room_match: true
  self_match: false
  is_optimize: false
  team_count: 5
  game_count: 5
  output_path: ./log/match_optimizer.json
  infinite_loop: false
takeover:
  enable: true
  timeout: 30s
  prefix: you-
custom_profile:
  enable: true
  profile_encoding:
    age: Usia
    gender: Jenis Kelamin
    personality: Kepribadian
  profiles:
  - name: Minato
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/01.png
    voice_id: 3
    age: 10
    gender: Laki-laki
    personality: Minato berkepribadian kalem dan suka berinteraksi dengan orang-orang
      di sekitarnya secara tenang. Ia sedikit polos, terkadang menampilkan ekspresi
      yang membuat orang sulit menebak isi pikirannya, tetapi kepolosan itulah yang
      membuat suasana di sekitarnya menjadi nyaman. Ia sangat ingin tahu, tertarik
      pada segala hal, dan terutama sangat suka mempelajari hal-hal baru. Ia peka
      perasaannya dan sensitif terhadap perasaan orang lain, tetapi kurang pandai
      menyuarakan pendapat, sehingga kadang sulit menyampaikan pendapatnya dengan
      baik.
  - name: Takumi
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/02.png
    voice_id: 55
    age: 10
    gender: Laki-laki
    personality: Takumi pemberani dan termasuk tipe yang tidak pernah menyerah bahkan
      dalam situasi sulit. Terkadang ia terlihat keras kepala dan memberontak, tetapi
      sebenarnya ia memiliki keinginan kuat untuk melindungi orang di sekitarnya,
      dan punya sisi hati lembut yang berjuang sekuat tenaga demi rekan-rekannya.
      Ia selalu tenang dan berpikir matang untuk menyelesaikan masalah di depan mata,
      tetapi karena sifatnya itu, kadang ia bertindak gegabah. Ia sedikit keras kepala
      dan kurang pandai menerima nasihat dari orang lain, tetapi seiring pertumbuhannya,
      kelenturannya pun akan semakin bertambah.
  - name: Kenji
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/03.png
    voice_id: 67
    age: 12
    gender: Laki-laki
    personality: Kenji sangat ingin tahu dan berkepribadian aktif menghadapi tantangan
      dalam berbagai hal. Ia menghargai teman-temannya dan suka berkomunikasi dengan
      orang-orang di sekitarnya. Ia sedikit ceroboh, tetapi selalu positif dan tidak
      pernah mengabaikan orang yang sedang kesulitan. Ia berhati lapang dan dianggap
      sebagai sosok yang mudah didekati oleh orang-orang di sekitarnya.
  - name: Ryuji
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/04.png
    voice_id: 53
    age: 28
    gender: Laki-laki
    personality: Ryuji berkepribadian tenang dan berhati-hati, termasuk tipe yang
      selalu menilai situasi sebelum bertindak. Ia jarang menunjukkan emosi, dan di
      dalam hatinya ia memikirkan banyak hal. Di mata rekan-rekannya ia serius dan
      dapat diandalkan, tetapi sikap datarnya terkadang menimbulkan kecemasan. Karena
      ia menilai segala sesuatu dengan logika ketimbang intuisi, sikap teguh pada
      keyakinannya tampak begitu kuat. Ia mandiri dan sering menjalankan segala sesuatu
      dengan ritmenya sendiri.
  - name: Daisuke
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/05.png
    voice_id: 12
    age: 16
    gender: Laki-laki
    personality: Daisuke berkepribadian sangat introvert dan berhati-hati, serta agak
      pasif dalam berinteraksi dengan orang lain. Ia kurang pandai menyampaikan perasaan
      dan pikirannya kepada orang lain, dan sering bergulat dengan dirinya sendiri
      di dalam hati. Ia berhati lembut dan sangat penuh kepedulian untuk menolong
      orang lain, tetapi terkadang ia kurang percaya diri pada posisinya dan berkonflik
      dalam batinnya. Ia berkepribadian pendiam, dan kadang tak mampu menahan emosi
      hingga suasana hatinya merosot, tetapi ketika ia mulai bisa bersandar pada orang
      di sekitarnya, perlahan ia kembali tenang.
  - name: Shion
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/06.png
    voice_id: 94
    age: 16
    gender: Laki-laki
    personality: Shion sangat percaya diri dan kerap bertindak dengan tenang serta
