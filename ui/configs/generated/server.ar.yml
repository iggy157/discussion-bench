      يُظهر مشاعره، وفي داخله يفكّر في أمور كثيرة. يثق به رفاقه ويرونه جادًّا يُعتمد
      عليه، إلا أنّ ملامحه الجامدة قد تبعث القلق أحيانًا. لأنه يحكم على الأمور بالعقل
