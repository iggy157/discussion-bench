server:
  web_socket:
    host: 0.0.0.0
    port: 8080
  authentication:
    enable: false
  timeout:
    action: 180s
    response: 300s
    acceptable: 5s
  max_continue_error_ratio: 0.2
game:
  agent_count: 5
  max_day: -1
  vote_visibility: true
  talk:
    max_count:
      per_agent: 4
      per_day: 20
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  whisper:
    max_count:
      per_agent: 0
      per_day: 0
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: -1
      mention_length: 50
      per_agent: -1
      base_length: 500
    max_skip: 0
  vote:
    max_count: 1
    allow_self_vote: true
  attack_vote:
    max_count: 1
    allow_self_vote: true
    allow_no_target: false
logic:
  day_phases:
  - name: morning_whisper
    actions:
    - whisper
    only_day: 0
  - name: daily_talk
    actions:
    - talk
  night_phases:
  - name: evening_whisper
    actions:
    - whisper
    only_day: 0
  - name: execution
    actions:
    - execution
    except_day: 0
  - name: divine
    actions:
    - divine
  - name: night_whisper
    actions:
    - whisper
    except_day: 0
  - name: guard
    actions:
    - guard
    except_day: 0
  - name: attack
    actions:
    - attack
    except_day: 0
  roles:
    5:
      WEREWOLF: 1
      POSSESSED: 1
      SEER: 1
      BODYGUARD: 0
      VILLAGER: 2
      MEDIUM: 0
matching:
  room_match: true
  self_match: false
  is_optimize: false
  team_count: 5
  game_count: 5
  output_path: ./log/match_optimizer.json
  infinite_loop: false
takeover:
  enable: true
  timeout: 30s
  prefix: you-
custom_profile:
  enable: true
  profile_encoding:
    age: العمر
    gender: الجنس
    personality: الشخصية
  profiles:
  - name: ميناتو
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/01.png
    voice_id: 3
    age: 10
    gender: ذكر
    personality: ميناتو شخصية هادئة الطباع، يفضّل التعامل مع من حوله بلطف وسكينة.
      فيه شيء من البراءة، وأحيانًا يرتسم على وجهه تعبير يصعب معه معرفة ما يفكّر فيه،
      لكن هذه العفوية تبعث الراحة في نفوس من حوله. يتميّز بفضول كبير، ويبدي اهتمامًا
      بكل شيء، وخاصةً يعشق تعلّم الأشياء الجديدة. شديد الحساسية ومرهف المشاعر تجاه
      الآخرين، لكنه يجد صعوبة في فرض رأيه، وأحيانًا لا يقدر على التعبير عن رأيه بوضوح.
  - name: تاكومي
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/02.png
    voice_id: 55
    age: 10
    gender: ذكر
    personality: تاكومي شجاع لا يستسلم أبدًا حتى في أصعب المواقف. قد يبدو أحيانًا
      متمرّدًا وحادّ الطبع، لكنه في الحقيقة يحمل رغبة قوية في حماية من حوله، وفيه
      جانب رقيق يبذل من أجله كل ما في وسعه لأجل رفاقه. يبقى دائمًا رابط الجأش ويفكّر
      مليًّا لحلّ المشكلة التي أمامه، لكن طبعه هذا قد يدفعه أحيانًا إلى التصرّف باندفاع.
      هو عنيد قليلًا ويجد صعوبة في تقبّل نصائح الآخرين، لكنه سيكتسب مرونة أكبر مع
      نموّه ونضجه.
  - name: كينجي
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/03.png
    voice_id: 67
    age: 12
    gender: ذكر
    personality: كينجي فضولي بطبعه ويحبّ خوض التحدّيات بحماس. يعتزّ بأصدقائه ويميل
      إلى التواصل مع من حوله. فيه شيء من الطيش أحيانًا، لكنه دائم الإيجابية ولا يتخلّى
      أبدًا عمّن هو في ضيق. هو سمح الطباع، ويراه من حوله شخصًا سهل المعشر ودودًا.
  - name: ريوجي
    avatar_url: https://aiwolfdial.github.io/aiwolf-nlp-viewer/images/male/04.png
