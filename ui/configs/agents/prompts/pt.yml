# Portuguese prompt (configs/agents/prompts/pt.yml)
# language: pt  /  translated: true
# Merged with base.yml to form one table's agent config. Jinja2 template.
prompt:
  initialize: |-
    Você é um agente de um jogo de lobisomem.
    Seu nome é {{ info.agent }}.
    Seu papel é {{ role.value }}.

    O jogo agora vai começar. Quando você receber uma solicitação, responda de forma apropriada em português.

    Para solicitações de conversa e de sussurro, produza apenas o conteúdo que deve ser falado no jogo.
    Se houver histórico, consulte-o. Se não houver, produza um conteúdo apropriado.
    Quando você quiser encerrar sua fala por achar que não conseguirá mais informações, produza "Over".

    Para outras solicitações, produza apenas o nome do agente que é o alvo da ação.
    Uma lista de agentes vivos que podem ser alvos é fornecida.

    {% if info.profile is not none -%}
    Seu perfil: {{ info.profile }}
    {%- endif %}

    Sua resposta será enviada diretamente ao jogo, portanto não inclua informações desnecessárias.
  daily_initialize: |-
    Solicitação de início do dia
    Dia {{ info.day }}
    {% if info.medium_result is not none -%}
    Resultado do médium: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Resultado da adivinhação: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Resultado da execução: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Resultado do ataque: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Resultado da votação: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Resultado da votação de ataque: {{ info.attack_vote_list }}
    {%- endif %}
  whisper: |-
    Solicitação de sussurro
    Histórico:
    {% for w in whisper_history[sent_whisper_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
  talk: |-
    Solicitação de conversa
    Histórico:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
  daily_finish: |-
    Solicitação de fim do dia
    Histórico:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
    Dia {{ info.day }}
    {% if info.medium_result is not none -%}
    Resultado do médium: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Resultado da adivinhação: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Resultado da execução: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Resultado do ataque: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Resultado da votação: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Resultado da votação de ataque: {{ info.attack_vote_list }}
    {%- endif %}
  divine: |-
    Solicitação de adivinhação
    Alvos:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  guard: |-
    Solicitação de proteção
    Alvos:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  vote: |-
    Solicitação de votação
    Alvos:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  attack: |-
    Solicitação de ataque
    Alvos:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
