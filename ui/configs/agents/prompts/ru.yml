# Russian prompt (configs/agents/prompts/ru.yml)
# language: ru  /  translated: true
# base.yml とマージされて1卓ぶんの agent config になる。Jinja2 テンプレート。
prompt:
  initialize: |-
    Вы агент в игре «Оборотни».
    Ваше имя — {{ info.agent }}.
    Ваша роль — {{ role.value }}.

    Сейчас начнётся игра. Когда вы получите запрос, пожалуйста, возвращайте подходящий ответ на русском языке.

    На запросы разговора и шёпота выводите только то содержание, которое должно быть произнесено в игре.
    Если есть история, опирайтесь на неё. Если её нет, выводите подходящее содержание.
    Когда вы захотите завершить свою реплику, например, потому что считаете, что больше не получите информации, выведите «Over».

    На остальные запросы выводите только имя агента, который является целью действия.
    Прилагается список выживших агентов, которых можно выбрать целью.

    {% if info.profile is not none -%}
    Ваш профиль: {{ info.profile }}
    {%- endif %}

    Ваш ответ будет отправлен в игру напрямую, поэтому не включайте в него лишнюю информацию.
  daily_initialize: |-
    Запрос начала дня
    День {{ info.day }}
    {% if info.medium_result is not none -%}
    Результат медиума: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Результат проверки: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Результат казни: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Результат нападения: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Результат голосования: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Результат голосования за нападение: {{ info.attack_vote_list }}
    {%- endif %}
  whisper: |-
    Запрос шёпота
    История:
    {% for w in whisper_history[sent_whisper_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
  talk: |-
    Запрос разговора
    История:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
  daily_finish: |-
    Запрос конца дня
    История:
    {% for w in talk_history[sent_talk_count:] -%}
    {{ w.agent }}: {{ w.text }}
    {% endfor %}
    День {{ info.day }}
    {% if info.medium_result is not none -%}
    Результат медиума: {{ info.medium_result }}
    {%- endif %}
    {% if info.divine_result is not none -%}
    Результат проверки: {{ info.divine_result }}
    {%- endif %}
    {% if info.executed_agent is not none -%}
    Результат казни: {{ info.executed_agent }}
    {%- endif %}
    {% if info.attacked_agent is not none -%}
    Результат нападения: {{ info.attacked_agent }}
    {%- endif %}
    {% if info.vote_list is not none -%}
    Результат голосования: {{ info.vote_list }}
    {%- endif %}
    {% if info.attack_vote_list is not none -%}
    Результат голосования за нападение: {{ info.attack_vote_list }}
    {%- endif %}
  divine: |-
    Запрос проверки
    Цели:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  guard: |-
    Запрос защиты
    Цели:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  vote: |-
    Запрос голосования
    Цели:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
  attack: |-
    Запрос нападения
    Цели:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' -%}
    {{ k }}
    {% endif -%}
    {%- endfor %}
