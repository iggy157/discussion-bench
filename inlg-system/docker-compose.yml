# INLG unified system — werewolf (AIWolfDial) + HiddenBench in one compose.
# INLG統合システム — 人狼(AIWolfDial)とHiddenBenchを1つのcomposeで.
#
# One config (this file + .env) selects what runs, via compose PROFILES:
#   docker compose --profile hiddenbench up --build      # HiddenBench only
#   docker compose --profile aiwolf up --build           # werewolf only
#   docker compose --profile aiwolf --profile hiddenbench up --build   # BOTH at once
#
# Both domains run concurrently because they are independent server+agent pairs on
# different ports (8080 werewolf, 8090 HiddenBench), mirroring the aiwolf-nlp-demo pattern
# of running multiple game servers side by side.
#
# 設定ひとつ (このファイル + .env) と compose profiles で実行内容を選ぶ. 両ドメインは
# 別ポートの独立した server+agent ペアなので同時起動できる (aiwolf-nlp-demo方式).

services:
  # ---------- Werewolf (AIWolfDial) ----------
  aiwolf-server:
    profiles: ["aiwolf"]
    build:
      context: ..
      dockerfile: inlg-system/docker/aiwolf-server.Dockerfile
    image: inlg-aiwolf-server:local
    command: ["-c", "/app/config/${AIWOLF_SERVER_CONFIG:-default_5.yml}"]
    volumes:
      - ../aiwolf-nlp-server/config:/app/config:ro
      - ./log/aiwolf:/app/log
    ports:
      - "${AIWOLF_PORT:-8080}:8080"
    restart: unless-stopped

  aiwolf-agents:
    profiles: ["aiwolf"]
    build:
      context: ..
      dockerfile: inlg-system/docker/agent.Dockerfile
    image: inlg-agent:local
    depends_on: [aiwolf-server]
    environment:
      DOMAIN: aiwolf
      LANG_CODE: ${LANG_CODE:-jp}
      CONDITION: ${CONDITION:-baseline}
      SERVER_URL: ws://aiwolf-server:8080/ws
      TEAM: ${AIWOLF_TEAM:-inlg-wolf}
      NUM: ${AIWOLF_NUM:-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    volumes:
      - ./log/aiwolf-agents:/app/agent/log
    restart: "no"

  # ---------- HiddenBench (collaborative reasoning) ----------
  hiddenbench-server:
    profiles: ["hiddenbench"]
    build:
      context: ..
      dockerfile: inlg-system/docker/hiddenbench-server.Dockerfile
    image: inlg-hiddenbench-server:local
    command:
      ["python", "src/server.py", "-c", "config/hiddenbench.yml"]
    environment:
      # The server reads its YAML; these are here for documentation / future env wiring.
      HB_LANG: ${LANG_CODE:-en}
    volumes:
      - ./log/hiddenbench:/app/log
    ports:
      - "${HB_PORT:-8090}:8090"
    restart: unless-stopped

  hiddenbench-agents:
    profiles: ["hiddenbench"]
    build:
      context: ..
      dockerfile: inlg-system/docker/agent.Dockerfile
    image: inlg-agent:local
    depends_on: [hiddenbench-server]
    environment:
      DOMAIN: hiddenbench
      LANG_CODE: ${LANG_CODE:-en}
      CONDITION: ${CONDITION:-baseline}
      SERVER_URL: ws://hiddenbench-server:8090/ws
      TEAM: ${HB_TEAM:-inlg-hb}
      NUM: 4
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    volumes:
      - ./log/hiddenbench-agents:/app/agent/log
    restart: "no"
